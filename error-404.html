<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="robots" content="noindex, nofollow">
<title>Page introuvable · Wintaskly</title>
<style>
  *,*::before,*::after{box-sizing:border-box}
  html,body{margin:0;padding:0;min-height:100vh;
    font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
    background:#0a0f1e;color:#e8eaf0;
    display:flex;align-items:center;justify-content:center;
    text-align:center;line-height:1.6;padding:1.5rem;
    background-image:
      radial-gradient(at 20% 0%,rgba(255,153,51,.08) 0%,transparent 50%),
      radial-gradient(at 80% 100%,rgba(255,204,51,.05) 0%,transparent 50%);}
  .box{max-width:460px;padding:2.5rem 1.75rem;
    background:rgba(19,24,41,.7);border:1px solid #2a3252;
    border-radius:20px;backdrop-filter:blur(10px);
    box-shadow:0 20px 60px rgba(0,0,0,.35)}
  .icon{width:88px;height:88px;margin:0 auto 1.25rem;
    background:linear-gradient(135deg,#ff9933 0%,#ffcc33 100%);
    border-radius:50%;display:flex;align-items:center;justify-content:center;
    font-size:2.8rem;font-weight:800;color:#0a0f1e;
    box-shadow:0 12px 40px rgba(255,153,51,.35)}
  h1{margin:0 0 .5rem;font-size:1.6rem;font-weight:700;
    background:linear-gradient(135deg,#ff9933,#ffcc33);
    -webkit-background-clip:text;background-clip:text;
    -webkit-text-fill-color:transparent}
  p{color:#a4abc4;font-size:.95rem;margin:.5rem 0}
  .btn{display:inline-flex;align-items:center;gap:.5rem;
    padding:.75rem 1.5rem;margin-top:1.5rem;
    background:linear-gradient(135deg,#ff9933,#ffcc33);color:#0a0f1e;
    border:0;border-radius:10px;font-family:inherit;font-size:.95rem;
    font-weight:600;cursor:pointer;text-decoration:none;
    transition:transform .15s ease}
  .btn:hover{transform:translateY(-2px)}
  small{color:#6b7390;font-size:.8rem;margin-top:1rem;display:block}
</style>
</head>
<body>
<div class="box">
  <div class="icon">404</div>
  <h1>Page introuvable</h1>
  <p>L'adresse que tu as saisie n'existe pas ou a été déplacée.</p>
  <a class="btn" href="/">🏠 Retour à l'accueil</a>
  <small>Erreur 404 · Wintaskly</small>
</div>
</body>
</html>
